name: Notify Updates to Slack

on:
  push:
    branches: [main]
    paths:
      - "updates/*.md"

permissions:
  contents: read

jobs:
  notify:
    name: Send Slack Notification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 2

      - name: Detect changed update files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'updates/*.md' || true)
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          DELIMITER=$(openssl rand -hex 16)
          {
            echo "files<<${DELIMITER}"
            echo "$CHANGED"
            echo "${DELIMITER}"
          } >> "$GITHUB_OUTPUT"

      - name: Build Slack message
        if: steps.changes.outputs.has_changes == 'true'
        id: message
        env:
          CHANGED_FILES: ${{ steps.changes.outputs.files }}
        run: |
          MESSAGE=""

          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            if [ ! -f "$FILE" ]; then
              continue
            fi

            # Extract period and commitCount from frontmatter
            PERIOD=$(sed -n 's/^period: *"\(.*\)"/\1/p' "$FILE")
            COMMITS=$(sed -n 's/^commitCount: *\(.*\)/\1/p' "$FILE")

            HEADER=":mega: Aegis Lab アップデート（${PERIOD}・${COMMITS} commits）"
            MESSAGE="${MESSAGE}${HEADER}\n\n"

            # Extract titles and impact lines
            while IFS= read -r line; do
              TITLE_MATCH=$(echo "$line" | sed -n 's/^## \(.*\)/\1/p')
              if [ -n "$TITLE_MATCH" ]; then
                CURRENT_TITLE="$TITLE_MATCH"
                continue
              fi

              IMPACT_MATCH=$(echo "$line" | sed -n 's/^\*\*これにより:\*\* *\(.*\)/\1/p')
              if [ -n "$IMPACT_MATCH" ] && [ -n "$CURRENT_TITLE" ]; then
                MESSAGE="${MESSAGE}• ${CURRENT_TITLE}\n  → ${IMPACT_MATCH}\n"
                CURRENT_TITLE=""
              fi
            done < "$FILE"

            MESSAGE="${MESSAGE}\n"
          done <<< "$CHANGED_FILES"

          SITE_URL="https://aegis-lab.pages.dev/updates"
          MESSAGE="${MESSAGE}:point_right: 詳細: ${SITE_URL}"

          DELIMITER=$(openssl rand -hex 16)
          {
            echo "text<<${DELIMITER}"
            echo -e "$MESSAGE"
            echo "${DELIMITER}"
          } >> "$GITHUB_OUTPUT"

      - name: Send to Slack
        if: steps.changes.outputs.has_changes == 'true'
        env:
          SLACK_TEXT: ${{ steps.message.outputs.text }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\": $(echo "$SLACK_TEXT" | jq -Rs .)}" \
            "$SLACK_WEBHOOK_URL"

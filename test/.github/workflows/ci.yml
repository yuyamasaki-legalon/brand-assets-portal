name: CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  packages: read

jobs:
  sandbox-scope:
    name: Sandbox Scope Guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Detect non-sandbox changes
        id: diff
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          MERGE_BASE=$(git merge-base "origin/${BASE_REF}" HEAD)

          ALLOW_REGEX='^(src/pages/sandbox/|docs/sandbox-guide\.md|skills/i18n-sandbox/)'

          FINAL_CHANGED=$(git diff --name-only "$MERGE_BASE"..HEAD)
          FINAL_DISALLOWED=$(echo "$FINAL_CHANGED" | grep -Ev "$ALLOW_REGEX" || true)

          if [ -z "$FINAL_DISALLOWED" ]; then
            echo "violation=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMITS=$(git rev-list "$MERGE_BASE"..HEAD)
          VIOLATIONS=""

          for COMMIT in $COMMITS; do
            FILES=$(git diff-tree --no-commit-id --name-only -r "$COMMIT")
            DISALLOWED=$(echo "$FILES" | grep -Ev "$ALLOW_REGEX" || true)
            if [ -n "$DISALLOWED" ]; then
              SHORT_COMMIT=$(git rev-parse --short "$COMMIT")
              COMMIT_MSG=$(git log -1 --format="%s" "$COMMIT" | head -c 50)
              for FILE in $DISALLOWED; do
                if echo "$FINAL_DISALLOWED" | grep -qF "$FILE"; then
                  VIOLATIONS="${VIOLATIONS}${SHORT_COMMIT} (${COMMIT_MSG}): ${FILE}"$'\n'
                fi
              done
            fi
          done

          if [ -n "$VIOLATIONS" ]; then
            echo "violation=true" >> "$GITHUB_OUTPUT"
            DELIMITER=$(openssl rand -hex 16)
            {
              echo "files<<${DELIMITER}"
              echo "$VIOLATIONS"
              echo "${DELIMITER}"
            } >> "$GITHUB_OUTPUT"
          else
            echo "violation=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR about non-sandbox changes
        if: steps.diff.outputs.violation == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          DISALLOWED_FILES: ${{ steps.diff.outputs.files }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const files = (process.env.DISALLOWED_FILES || '').trim();
            if (!files) return;

            const list = files
              .split('\n')
              .filter(Boolean)
              .map((file) => `- \`${file}\``)
              .join('\n');

            const body = [
              '⚠️ Sandbox 外の変更を検出しました ⚠️',
              'もし意図していない変更であれば、修正をお願いします。',
              'ブランチ環境にデプロイするだけで、main ブランチにマージする予定がなければ修正しないで大丈夫です。',
              '',
              'もし修正する場合ですが、以下のコミットに sandbox 以外の変更があります。',
              '`git rebase -i` でコミット履歴を整理してください。agent に対して依頼しても良いです。',
              '',
              '**対象コミット・ファイル**',
              '```',
              files,
              '```',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Warn about non-sandbox changes
        if: steps.diff.outputs.violation == 'true'
        env:
          DISALLOWED_FILES: ${{ steps.diff.outputs.files }}
        run: |
          echo "::error::以下のコミットに sandbox 以外の変更があります。" \
            "git rebase -i でコミット履歴を整理してください。"
          echo "対象コミット・ファイル:"
          echo "$DISALLOWED_FILES"
          exit 1

  checks:
    name: Typecheck & Build
    uses: ./.github/workflows/checks.yml
